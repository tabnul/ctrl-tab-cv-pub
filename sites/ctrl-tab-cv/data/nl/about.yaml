details: |
  Thijs ademt cloud. Hij leerde in een vroeg stadium dat public cloud technologie een game-changer kan zijn.
  Tijdens zijn carrière werkte hij vooral op het snijvlak tussen software development en operations.
  Thijs voelt zich het best thuis in omgevingen waar applicaties en infrastructuur samen komen.
  Thijs is breed georiënteerd, heeft een technisch hart en staat altijd open voor nieuwe uitdagingen.
  Zijn toegankelijkheid en t-shaped profiel maken dat hij in staat is een brug te slaan tussen verschillende disciplines en afdelingen.
  Zijn brede ervaring en analytische vaardigheden zorgen ervoor dat hij een uitdaging van verschillende hoeken kan benaderen.
  Thijs heeft een rustige persoonlijkheid en geeft zijn mening. 
  Hij kan zelfstandig werken, maar houdt ook van groeps-dynamiek.
  Hij kan meerdere rollen aannemen (zoals engineer, tester, architect of tech-lead).
  Thijs heeft ervaring met het werken in Agile teams (bijvoorbeeld door het werken volgens de Scrum en Kanban methodiek)
